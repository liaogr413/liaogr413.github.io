            background-color: #00051c !important; 
            color: #ffffff !important;
            min-height: 100vh;
        }

        }

        /* 3. 恢復茶壺機器人的背景圖（因為剛才被 * 透明掉了） */

            display: block; /* 確保它們顯示 */
        }

        /* 4. 微調文字顏色 */
        ins {
            color: #aaaaaa !important;
            text-decoration: none;
        }
    </style>
